<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LegalDev analiza RGPD, EU AI Act, LOPDGDD, ENS y más — y te dice exactamente qué implementar en tu proyecto de software.">
  <title>LegalDev — Análisis legal automático para developers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* --- Custom Properties --- */
:root {
  --bg:        #0a0a0a;
  --surface:   #111111;
  --border:    #1f1f1f;
  --text:      #ededed;
  --muted:     #888888;
  --accent:    #00d084;
  --accent-dim:#00d08420;
  --accent-rgb: 0, 208, 132;
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Inter', sans-serif;
  --max-w:     1100px;
  --section-pad: 80px 0;
}

/* --- Reset --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
ul { list-style: none; }
button { cursor: pointer; border: none; background: none; font: inherit; }
select, input { font: inherit; }

/* --- Layout utilities --- */
.container {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
}
.section-title {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.section-subtitle {
  font-family: var(--font-sans);
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 48px;
}

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 20px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  border-radius: 6px;
  transition: opacity 150ms, box-shadow 150ms, border-color 150ms;
  white-space: nowrap;
}
.btn--primary {
  background: var(--accent);
  color: var(--bg);
  box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.25);
}
.btn--primary:hover { box-shadow: 0 0 28px rgba(var(--accent-rgb), 0.4); opacity: 0.95; }
.btn--ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn--ghost:hover { border-color: var(--muted); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.btn--full { width: 100%; font-family: var(--font-mono); }

/* --- Navbar --- */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex;
  align-items: center;
}
.navbar__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}
.navbar__logo {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.navbar__link {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--muted);
  transition: color 150ms;
}
.navbar__link:hover { color: var(--text); }

/* --- Hero --- */
@keyframes bgscroll {
  from { background-position: 0 0; }
  to   { background-position: 40px 40px; }
}

.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
}
.hero__bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: bgscroll 10s linear infinite;
  pointer-events: none;
}
.hero__glow {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse 800px 400px at 50% 0%, rgba(0,208,132,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero__content {
  position: relative;
  z-index: 1;
  padding-top: 80px;
  padding-bottom: 80px;
  max-width: 680px;
}
.hero__label {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 24px;
  letter-spacing: 0.05em;
}
.hero__headline {
  font-family: var(--font-mono);
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.5px;
  color: var(--text);
}
.hero__accent { color: var(--accent); }
.hero__sub {
  font-family: var(--font-sans);
  font-size: 17px;
  color: var(--muted);
  line-height: 1.6;
  margin-top: 20px;
  max-width: 560px;
}
.hero__ctas {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  flex-wrap: wrap;
}
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar__inner">
      <a href="/" class="navbar__logo">&lt;/legaldev&gt;</a>
      <a href="https://github.com/gustavintavo8/legaldev" class="navbar__link" target="_blank" rel="noopener">Ver en GitHub</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero__bg-grid"></div>
    <div class="hero__glow"></div>
    <div class="container hero__content">
      <p class="hero__label">// análisis legal automático</p>
      <h1 class="hero__headline">Sabe qué leyes aplican a tu <span class="hero__accent">proyecto.</span></h1>
      <p class="hero__sub">Describe tu proyecto de software. LegalDev analiza RGPD, EU AI Act, LOPDGDD, ENS y más — y te dice exactamente qué implementar.</p>
      <div class="hero__ctas">
        <button class="btn btn--primary" id="hero-cta">Probar ahora →</button>
        <a href="https://legaldev-production.up.railway.app/docs" class="btn btn--ghost" target="_blank" rel="noopener">Ver documentación</a>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
  </script>
</body>
</html>
