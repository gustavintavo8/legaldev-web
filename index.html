<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LegalDev analiza RGPD, EU AI Act, LOPDGDD, ENS y más — y te dice exactamente qué implementar en tu proyecto de software.">
  <title>LegalDev — Análisis legal automático para developers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* --- Custom Properties --- */
:root {
  --bg:        #0a0a0a;
  --surface:   #111111;
  --border:    #1f1f1f;
  --text:      #ededed;
  --muted:     #888888;
  --accent:    #00d084;
  --accent-dim:#00d08420;
  --accent-rgb: 0, 208, 132;
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Inter', sans-serif;
  --max-w:     1100px;
  --section-pad: 80px 0;
}

/* --- Reset --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
ul { list-style: none; }
button { cursor: pointer; border: none; background: none; font: inherit; }
select, input { font: inherit; }

/* --- Layout utilities --- */
.container {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 0 24px;
}
.section-title {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.section-subtitle {
  font-family: var(--font-sans);
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 48px;
}

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 20px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  border-radius: 6px;
  transition: opacity 150ms, box-shadow 150ms, border-color 150ms;
  white-space: nowrap;
}
.btn--primary {
  background: var(--accent);
  color: var(--bg);
  box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.25);
}
.btn--primary:hover { box-shadow: 0 0 28px rgba(var(--accent-rgb), 0.4); opacity: 0.95; }
.btn--ghost {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn--ghost:hover { border-color: var(--muted); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.btn--full { width: 100%; font-family: var(--font-mono); }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
  </script>
</body>
</html>
